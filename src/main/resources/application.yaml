spring:
  application:
    name: user-service
  datasource:
    url: ${ENV_USER_DATASOURCE_URL:jdbc:postgresql://localhost:5432/user_db}
    username: ${ENV_USER_DATASOURCE_USERNAME:appuser}
    password: ${ENV_USER_DATASOURCE_PASSWORD:Password@123}
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: ${SPRING_LIQUIBASE_ENABLED:true}
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: ${SPRING_LIQUIBASE_DEFAULT_SCHEMA:user_mgmt}
    liquibase-schema: ${SPRING_LIQUIBASE_LIQUIBASE_SCHEMA:public}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA:user_mgmt}
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8082}

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://localhost:4201,http://localhost:4211,http://localhost:8080,https://dev.electrahub.com,https://dev.electrahub.com:8443,http://driver-portal-dev.electrahub.com:8080,https://driver-portal-dev.electrahub.com:8443}
  payment-service:
    base-url: ${APP_PAYMENT_SERVICE_BASE_URL:http://payment-service:8083}
  session-service:
    base-url: ${APP_SESSION_SERVICE_BASE_URL:http://session-service:8083}
  security:
    jwt:
      issuer: ${APP_SECURITY_JWT_ISSUER:auth-service}
      secret: ${APP_SECURITY_JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_64+_CHAR_SECRET_CHANGE_ME}
  dev-admin:
    enabled: ${APP_DEV_ADMIN_ENABLED:false}
    email: ${APP_DEV_ADMIN_EMAIL:sysadmin.dev@electrahub.com}
    password: ${APP_DEV_ADMIN_PASSWORD:Admin@12345}
    first-name: ${APP_DEV_ADMIN_FIRST_NAME:System}
    last-name: ${APP_DEV_ADMIN_LAST_NAME:Admin}
    phone-number: ${APP_DEV_ADMIN_PHONE_NUMBER:+15550000001}
  dev-user:
    password: ${APP_DEV_USER_PASSWORD:User@12345}
  rbac:
    policy-key: ${APP_RBAC_POLICY_KEY:gateway-default}
    internal-api-key: ${APP_RBAC_INTERNAL_API_KEY:dev-rbac-internal-key}
    gateway-base-url: ${APP_RBAC_GATEWAY_BASE_URL:http://api-gateway:8090}
    gateway-invalidate-path: ${APP_RBAC_GATEWAY_INVALIDATE_PATH:/internal/rbac/cache/invalidate}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.electrahub.user: INFO

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9082}
    reflection-service-enabled: ${GRPC_REFLECTION_ENABLED:true}
    health-service-enabled: true

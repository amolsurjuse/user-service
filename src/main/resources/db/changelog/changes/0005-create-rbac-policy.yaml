databaseChangeLog:
  - changeSet:
      id: 0005-create-rbac-policy
      author: codex
      changes:
        - createTable:
            tableName: rbac_policies
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: policy_key
                  type: varchar(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: role_hierarchy
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: default_decision
                  type: varchar(8)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

        - createTable:
            tableName: rbac_policy_rules
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: policy_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: sort_order
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: methods
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: path_pattern
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: effect
                  type: varchar(8)
                  constraints:
                    nullable: false
              - column:
                  name: allow_anonymous
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: required_roles
                  type: varchar(400)

        - addForeignKeyConstraint:
            baseTableName: rbac_policy_rules
            baseColumnNames: policy_id
            referencedTableName: rbac_policies
            referencedColumnNames: id
            constraintName: fk_rbac_policy_rules_policy
            onDelete: cascade

        - addUniqueConstraint:
            tableName: rbac_policy_rules
            columnNames: policy_id, sort_order
            constraintName: uq_rbac_policy_rules_policy_sort

        - createIndex:
            tableName: rbac_policy_rules
            indexName: idx_rbac_policy_rules_policy_id
            columns:
              - column:
                  name: policy_id

        - insert:
            tableName: rbac_policies
            columns:
              - column:
                  name: id
                  value: "00000000-0000-0000-0000-000000000100"
              - column:
                  name: policy_key
                  value: gateway-default
              - column:
                  name: role_hierarchy
                  value: "ROLE_SYSTEM_ADMIN > ROLE_USER"
              - column:
                  name: default_decision
                  value: DENY
              - column:
                  name: version
                  valueNumeric: 1

        - insert:
            tableName: rbac_policy_rules
            columns:
              - column: { name: id, value: "00000000-0000-0000-0000-000000000101" }
              - column: { name: policy_id, value: "00000000-0000-0000-0000-000000000100" }
              - column: { name: sort_order, valueNumeric: 0 }
              - column: { name: name, value: cors-preflight }
              - column: { name: methods, value: OPTIONS }
              - column: { name: path_pattern, value: "/**" }
              - column: { name: effect, value: ALLOW }
              - column: { name: allow_anonymous, valueBoolean: true }


databaseChangeLog:
  - changeSet:
      id: 0007-add-pricing-rbac-rules
      author: codex
      changes:
        - sql:
            dbms: postgresql
            splitStatements: true
            stripComments: true
            sql: |
              -- Remove malformed ad-hoc pricing rule if it exists.
              DELETE FROM rbac_policy_rules r
              USING rbac_policies p
              WHERE r.policy_id = p.id
                AND p.policy_key = 'gateway-default'
                AND r.name = 'pricing'
                AND r.path_pattern = '/**'
                AND r.methods LIKE '%/PRICING/API/V1/%';

              INSERT INTO rbac_policy_rules (
                id, policy_id, sort_order, name, methods, path_pattern, effect, allow_anonymous, required_roles
              )
              SELECT
                '00000000-0000-0000-0000-000000000201',
                p.id,
                (SELECT COALESCE(MAX(r.sort_order), -1) + 1 FROM rbac_policy_rules r WHERE r.policy_id = p.id),
                'pricing-admin',
                '*',
                '/pricing/api/v1/pricing/plans/**',
                'ALLOW',
                false,
                'SYSTEM_ADMIN'
              FROM rbac_policies p
              WHERE p.policy_key = 'gateway-default'
                AND NOT EXISTS (
                  SELECT 1 FROM rbac_policy_rules r
                  WHERE r.policy_id = p.id AND r.name = 'pricing-admin'
                );

              INSERT INTO rbac_policy_rules (
                id, policy_id, sort_order, name, methods, path_pattern, effect, allow_anonymous, required_roles
              )
              SELECT
                '00000000-0000-0000-0000-000000000202',
                p.id,
                (SELECT COALESCE(MAX(r.sort_order), -1) + 1 FROM rbac_policy_rules r WHERE r.policy_id = p.id),
                'pricing-search',
                'POST,GET',
                '/pricing/api/v1/pricing/search/**',
                'ALLOW',
                false,
                'USER'
              FROM rbac_policies p
              WHERE p.policy_key = 'gateway-default'
                AND NOT EXISTS (
                  SELECT 1 FROM rbac_policy_rules r
                  WHERE r.policy_id = p.id AND r.name = 'pricing-search'
                );

              INSERT INTO rbac_policy_rules (
                id, policy_id, sort_order, name, methods, path_pattern, effect, allow_anonymous, required_roles
              )
              SELECT
                '00000000-0000-0000-0000-000000000203',
                p.id,
                (SELECT COALESCE(MAX(r.sort_order), -1) + 1 FROM rbac_policy_rules r WHERE r.policy_id = p.id),
                'pricing-calculate',
                'POST',
                '/pricing/api/v1/pricing/calculate/**',
                'ALLOW',
                false,
                'USER'
              FROM rbac_policies p
              WHERE p.policy_key = 'gateway-default'
                AND NOT EXISTS (
                  SELECT 1 FROM rbac_policy_rules r
                  WHERE r.policy_id = p.id AND r.name = 'pricing-calculate'
                );

              INSERT INTO rbac_policy_rules (
                id, policy_id, sort_order, name, methods, path_pattern, effect, allow_anonymous, required_roles
              )
              SELECT
                '00000000-0000-0000-0000-000000000204',
                p.id,
                (SELECT COALESCE(MAX(r.sort_order), -1) + 1 FROM rbac_policy_rules r WHERE r.policy_id = p.id),
                'pricing-history',
                'GET',
                '/pricing/api/v1/pricing/history/**',
                'ALLOW',
                false,
                'SYSTEM_ADMIN'
              FROM rbac_policies p
              WHERE p.policy_key = 'gateway-default'
                AND NOT EXISTS (
                  SELECT 1 FROM rbac_policy_rules r
                  WHERE r.policy_id = p.id AND r.name = 'pricing-history'
                );

              INSERT INTO rbac_policy_rules (
                id, policy_id, sort_order, name, methods, path_pattern, effect, allow_anonymous, required_roles
              )
              SELECT
                '00000000-0000-0000-0000-000000000205',
                p.id,
                (SELECT COALESCE(MAX(r.sort_order), -1) + 1 FROM rbac_policy_rules r WHERE r.policy_id = p.id),
                'pricing-signals',
                '*',
                '/pricing/api/v1/pricing/signals/**',
                'ALLOW',
                false,
                'SYSTEM_ADMIN'
              FROM rbac_policies p
              WHERE p.policy_key = 'gateway-default'
                AND NOT EXISTS (
                  SELECT 1 FROM rbac_policy_rules r
                  WHERE r.policy_id = p.id AND r.name = 'pricing-signals'
                );

              INSERT INTO rbac_policy_rules (
                id, policy_id, sort_order, name, methods, path_pattern, effect, allow_anonymous, required_roles
              )
              SELECT
                '00000000-0000-0000-0000-000000000206',
                p.id,
                (SELECT COALESCE(MAX(r.sort_order), -1) + 1 FROM rbac_policy_rules r WHERE r.policy_id = p.id),
                'pricing-ocpi',
                '*',
                '/pricing/api/v1/pricing/ocpi/**',
                'ALLOW',
                false,
                'SYSTEM_ADMIN'
              FROM rbac_policies p
              WHERE p.policy_key = 'gateway-default'
                AND NOT EXISTS (
                  SELECT 1 FROM rbac_policy_rules r
                  WHERE r.policy_id = p.id AND r.name = 'pricing-ocpi'
                );

              INSERT INTO rbac_policy_rules (
                id, policy_id, sort_order, name, methods, path_pattern, effect, allow_anonymous, required_roles
              )
              SELECT
                '00000000-0000-0000-0000-000000000207',
                p.id,
                (SELECT COALESCE(MAX(r.sort_order), -1) + 1 FROM rbac_policy_rules r WHERE r.policy_id = p.id),
                'pricing-health',
                'GET',
                '/pricing/api/v1/pricing/health',
                'ALLOW',
                true,
                ''
              FROM rbac_policies p
              WHERE p.policy_key = 'gateway-default'
                AND NOT EXISTS (
                  SELECT 1 FROM rbac_policy_rules r
                  WHERE r.policy_id = p.id AND r.name = 'pricing-health'
                );

              UPDATE rbac_policies p
              SET version = p.version + 1,
                  updated_at = now()
              WHERE p.policy_key = 'gateway-default'
                AND EXISTS (
                  SELECT 1
                  FROM rbac_policy_rules r
                  WHERE r.policy_id = p.id
                    AND r.name IN (
                      'pricing-admin',
                      'pricing-search',
                      'pricing-calculate',
                      'pricing-history',
                      'pricing-signals',
                      'pricing-ocpi',
                      'pricing-health'
                    )
                );

databaseChangeLog:
  - changeSet:
      id: 0008-add-account-deletion-flags
      author: codex
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: pending_deletion
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: deletion_requested_at
                  type: timestamptz


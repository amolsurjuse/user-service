databaseChangeLog:
  - changeSet:
      id: 0008-add-charger-public-rbac-rules
      author: codex
      changes:
        - sql:
            dbms: postgresql
            splitStatements: true
            stripComments: true
            sql: |
              INSERT INTO rbac_policy_rules (
                id, policy_id, sort_order, name, methods, path_pattern, effect, allow_anonymous, required_roles
              )
              SELECT
                '00000000-0000-0000-0000-000000000208',
                p.id,
                (SELECT COALESCE(MAX(r.sort_order), -1) + 1 FROM rbac_policy_rules r WHERE r.policy_id = p.id),
                'charger-graphql-public',
                'POST,GET',
                '/charger/graphql',
                'ALLOW',
                true,
                ''
              FROM rbac_policies p
              WHERE p.policy_key = 'gateway-default'
                AND NOT EXISTS (
                  SELECT 1 FROM rbac_policy_rules r
                  WHERE r.policy_id = p.id AND r.name = 'charger-graphql-public'
                );

              INSERT INTO rbac_policy_rules (
                id, policy_id, sort_order, name, methods, path_pattern, effect, allow_anonymous, required_roles
              )
              SELECT
                '00000000-0000-0000-0000-000000000209',
                p.id,
                (SELECT COALESCE(MAX(r.sort_order), -1) + 1 FROM rbac_policy_rules r WHERE r.policy_id = p.id),
                'charger-admin-chargers-connectors-public',
                'GET',
                '/charger/api/v1/admin/chargers/connectors',
                'ALLOW',
                true,
                ''
              FROM rbac_policies p
              WHERE p.policy_key = 'gateway-default'
                AND NOT EXISTS (
                  SELECT 1 FROM rbac_policy_rules r
                  WHERE r.policy_id = p.id AND r.name = 'charger-admin-chargers-connectors-public'
                );

              UPDATE rbac_policies p
              SET version = p.version + 1,
                  updated_at = now()
              WHERE p.policy_key = 'gateway-default'
                AND EXISTS (
                  SELECT 1
                  FROM rbac_policy_rules r
                  WHERE r.policy_id = p.id
                    AND r.name IN (
                      'charger-graphql-public',
                      'charger-admin-chargers-connectors-public'
                    )
                );
